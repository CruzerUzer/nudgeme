# NudgeMe – nginx-config (prod)
# Kopiera till /etc/nginx/sites-available/nudgeme och symlänka:
#   sudo ln -s /etc/nginx/sites-available/nudgeme /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d nudgeme.faris.se   (lägger till HTTPS + redirect)
#
# Byt <BACKEND_PORT> mot NudgeMe-backendens port (t.ex. 3002).

server {
    listen 80;
    listen [::]:80;
    server_name nudgeme.faris.se;

    # Let's Encrypt ACME-challenge (för certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Statisk frontend (byggd dist/). SPA-fallback till index.html.
    root /srv/NudgeMe/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Backend-API (Node/Express + nudge-motor). Täcker även bakgrundsbilder
    # (/api/backgrounds/image/...) och login-bakgrund.
    location /api/ {
        proxy_pass http://localhost:<BACKEND_PORT>;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Rymmer bilduppladdningar (bakgrundspaket, ~15 MB/bild).
    client_max_body_size 25M;
}

# HTTPS-blocket läggs till automatiskt av `certbot --nginx`.
